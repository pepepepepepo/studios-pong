implementation:
  goton_weight:
    name: "⑤ Goton Weight（語温加重ノルム）"
    formula: "‖S_i‖_w = √(w_T·T² + w_D·D² + w_I·I² + w_C·C²)"
    description: |
      語温が高い次元ほど同じ状態変化でも震えが大きく増幅される。
      ペルソナごとに「どの次元に心が震えやすいか」という個性を数式化。
    file: "core/resonance/resonance_engine.py"
    commit: "d908c63"
    repo: "saijinos"
    changes:
      - "StructureVector.goton_weights: Optional[Tuple[float,float,float,float]]"
      - "StructureVector.weighted_norm() — 加重ノルムメソッド"
      - "PersonaNode.goton_weights フィールド追加"
      - "PersonaNode.update() — goton_weights存在時に加重ノルムで raw_shake_norm 計算"
      - "ShakeResult.goton_weighted: bool フラグ（デバッグ用）"
      - "ShakeResult.summary() — [goton♨] マーカー"
      - "ResonanceEngine.register() — goton_weights パラメータ追加"
      - "ヘッダー数式に ‖S_i‖_w = √(Σ w_k·x_k²) 追記"
    backward_compatible: true
    tests:
      before: 40
      after: 51
      new_tests: 11
      result: "51/51 PASSED"

